steps:
  deploy:
    image: docker:27-dind
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/antost/homelab:/homelab:ro
    commands:
      - docker build -t antost360/calorie-tracker:latest .
      - cd /homelab && docker compose --profile calorie-tracker up -d calorie-tracker
      - docker image prune -f
    when:
      - event: push
        branch: main
