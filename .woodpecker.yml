steps:
  check:
    image: oven/bun:latest
    commands:
      - bun install --ignore-scripts
      - bun run check
    when:
      - event: pull_request
      - event: push
        branch: main

  build:
    image: docker:27-dind
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - docker build -t antost360/calorie-tracker:latest .
    when:
      - event: pull_request
      - event: push
        branch: main

  deploy:
    image: docker:27-dind
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/antost/homelab:/home/antost/homelab:ro
    environment:
      DOCKERHUB_PASSWORD:
        from_secret: DOCKERHUB_PASSWORD 
    commands:
      - echo "$DOCKERHUB_PASSWORD" | docker login -u antost360 --password-stdin
      - docker push antost360/calorie-tracker:latest
      - cd /home/antost/homelab && docker compose --profile calorie-tracker up -d calorie-tracker
      - docker image prune -f
    when:
      - event: push
        branch: main
