services:
  web:
    image: antost360/calorie-tracker:latest
    ports:
      - "80:3000"
    volumes:
      - ./data:/app/data
      - ./public/photos:/app/public/photos
    environment:
      - DATABASE_URL=./data/app.db
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - OPENCODE_API_URL=https://opencode.ai/zen/go/v1
    restart: unless-stopped
